<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация — Дивно Мёд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-wrap">
            <a href="index.html" class="logo">
                <span class="logo-text">Дивно Мёд</span>
            </a>
            <nav class="main-nav">
                <a href="index.html">Главная</a>
                <a href="index.html#catalog">Каталог</a>
                <a href="about.html">О пасеке</a>
                <a href="faq.html">Вопросы</a>
            </nav>
            <div class="header-actions" style="display: flex; align-items: center; gap: 25px; font-weight: 600; font-size: 0.95rem;">
                <a href="login.html" id="authLink" style="text-decoration: none; color: inherit; cursor: pointer;">
                    <span id="authText">Войти</span>
                </a>
                <div class="cart-widget" id="cartWidget" style="cursor: pointer;">
                    Корзина (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 80px 0 120px; display: flex; justify-content: center; min-height: 60vh;">
        <div class="auth-card">
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-target="login">Вход</button>
                <button class="auth-tab" data-target="register">Регистрация</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email или Телефон</label>
                    <input type="text" class="form-control" required placeholder="mail@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Войти в кабинет</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Ваше Имя</label>
                    <input type="text" class="form-control" required placeholder="Иван">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" required placeholder="mail@example.com">
                </div>
                <div class="form-group">
                    <label>Придумайте пароль</label>
                    <input type="password" class="form-control" required placeholder="Минимум 6 символов">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Зарегистрироваться</button>
            </form>

        </div>
    </main>

    <footer class="site-footer">
        <div class="container text-center">
            <p>&copy; 2026 Кочевая пасека "Дивно Мёд". Все права защищены.</p>
        </div>
    </footer>

    <div id="cartDrawerOverlay"></div>
    <div id="cartDrawer">
        <div class="cart-drawer-header">
            <h3 class="serif-font" style="font-size: 26px; margin: 0; color: var(--dark-bg);">Ваша корзина</h3>
            <button id="cartDrawerClose" style="background:none; border:none; font-size:32px; color: var(--text-muted); cursor:pointer;">&times;</button>
        </div>
        <div id="cartDrawerBody"></div>
        <div id="cartDrawerFooter">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 700; font-size: 1.2rem; color: var(--dark-bg);">
                <span>Итого:</span>
                <span id="cartDrawerSubtotal">0 ₽</span>
            </div>
            <a href="cart.html" class="btn btn-primary" style="display: block; text-align: center; width: 100%;">Перейти к оформлению</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
