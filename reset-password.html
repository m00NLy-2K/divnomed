<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container" style="padding: 100px 0; max-width: 400px; margin: 0 auto; text-align: center;">
        <h2 class="serif-font">Новый пароль</h2>
        
        <form id="resetPasswordForm" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            <input type="password" id="newPassword" placeholder="Введите новый пароль" required style="padding: 12px; border-radius: 8px; border: 1px solid #ccc;">
            <button type="submit" class="btn btn-primary">Сохранить пароль</button>
        </form>
    </main>

    <script src="script.js"></script>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token'); 
            const newPassword = document.getElementById('newPassword').value;

            if (!token) {
                showToast("Ошибка: нет токена сброса в ссылке!", "error");
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });

                const result = await response.json();
                
                if (result.error) {
                    showToast(result.error, "error");
                } else {
                    showToast("Пароль изменен! Теперь вы можете войти.", "success");
                    // Ждем 2 секунды, чтобы юзер прочитал Toast, и перекидываем на логин
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (error) {
                showToast("Ошибка соединения с сервером", "error");
            }
        });
    </script>
</body>
</html>
