<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное — Дивно Мёд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-wrap">
            <a href="index.html" class="logo">
                <span class="logo-text">Дивно Мёд</span>
            </a>
            <nav class="main-nav">
                <a href="index.html">Главная</a>
                <a href="index.html#catalog">Каталог</a>
                <a href="about.html">О пасеке</a>
                <a href="faq.html">Вопросы</a>
            </nav>
            <div class="header-actions">
                <div class="fav-widget" style="display: inline-block; margin-right: 15px; cursor: pointer;">
                    <span class="action-text">Избранное</span> (<span id="fav-count">0</span>)
                </div>
                <div class="cart-widget" id="cartWidget" style="display: inline-block; cursor: pointer;">
                    <span class="action-text">Корзина</span> (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 60px 0 100px; min-height: 65vh;">
        <h1 class="section-title" style="margin-bottom: 40px;">Избранное</h1>
        
        <div id="favPageEmptyState" style="display: none; text-align: center; padding: 60px 0; background: white; border-radius: 12px; border: 1px solid #eae4de;">
            <div style="font-size: 64px; color: #d1cedc; margin-bottom: 20px;">♡</div>
            <h3 class="serif-font" style="font-size: 28px; margin-bottom: 15px;">Список желаний пуст</h3>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Добавляйте любимые сорта мёда в избранное, чтобы не потерять их.</p>
            <a href="index.html#catalog" class="btn btn-primary">Перейти в каталог</a>
        </div>

        <div id="favPageItems" class="products-grid" style="display: none;">
            </div>
    </main>

    <footer class="site-footer">
        <div class="container text-center">
            <p>&copy; 2026 Кочевая пасека "Дивно Мёд". Все права защищены.</p>
        </div>
    </footer>

    <div id="cartDrawerOverlay"></div>
    <div id="cartDrawer">
        <div class="cart-drawer-header">
            <h3 class="serif-font" style="font-size: 26px; margin: 0; color: var(--dark-bg);">Ваша корзина</h3>
            <button id="cartDrawerClose" style="background:none; border:none; font-size:32px; color: var(--text-muted); cursor:pointer;">&times;</button>
        </div>
        <div id="cartDrawerBody"></div>
        <div id="cartDrawerFooter">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 700; font-size: 1.2rem; color: var(--dark-bg);">
                <span>Итого:</span>
                <span id="cartDrawerSubtotal">0 ₽</span>
            </div>
            <a href="cart.html" class="btn btn-primary" style="display: block; text-align: center; width: 100%;">Перейти к оформлению</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
